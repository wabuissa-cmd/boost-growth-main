# Railway — Dockerfile deploy
# IMPORTANT: Settings → Deploy → Start Command must be EMPTY or match uvicorn below.
# Delete any "npx serve ..." command (old frontend-only config).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn server:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/"
healthcheckTimeout = 120
