# Force Nixpacks (NOT Docker). Root Directory in Railway Settings must be EMPTY.

[build]
builder = "NIXPACKS"
buildCommand = "pip install -r backend/requirements.txt && (test -f backend/static/index.html || bash build.sh)"

[deploy]
startCommand = "cd backend && python3 -m uvicorn server:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/"
healthcheckTimeout = 300
